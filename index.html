<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livo</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 40px;
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: rgba(0,0,0,0.5);
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
    }
    .footer {
      margin-top: 48px;
      font-size: 14px;
      color: rgba(0,0,0,0.35);
    }
    .footer a {
      color: #1AC944;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sparkGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="25%"  stop-color="#ffffff" stop-opacity="0.85"/>
        <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <filter id="rayBloom" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="2.5"/>
      </filter>
      <g id="spark">
        <circle r="110" fill="url(#sparkGlow)"/>
        <circle r="14" fill="#ffffff"/>
        <g filter="url(#rayBloom)" opacity="0.9" stroke="#ffffff" stroke-linecap="round">
          <line x1="0" y1="-95" x2="0" y2="95"  stroke-width="4"/>
          <line x1="-95" y1="0" x2="95" y2="0"  stroke-width="4"/>
          <line x1="-60" y1="-60" x2="60" y2="60" stroke-width="2" opacity="0.6"/>
          <line x1="-60" y1="60" x2="60" y2="-60" stroke-width="2" opacity="0.6"/>
        </g>
      </g>
    </defs>
    <circle cx="684" cy="448" r="244" fill="#1AB33D"/>
    <circle cx="287" cy="612" r="186" fill="#767676"/>
    <use href="#spark" x="458" y="541"/>
  </svg>

  <h1>Livo</h1>
  <p>The connection that finds you.</p>

  <div class="footer">
    <a href="privacy.html">Privacy Policy</a>
  </div>
</body>
</html>
